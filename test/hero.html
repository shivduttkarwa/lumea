<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Luméa Hero</title>

  <style>
    @import url("https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap");

    :root {
      --white: #ffffff;
      --black: #050505;
      --green: #c7f099;
      --line: rgba(255, 255, 255, 0.72);
      --panel: rgba(255, 255, 255, 0.96);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #111;
      font-family: "Inter", system-ui, sans-serif;
      overflow-x: hidden;
      cursor: auto;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background: #13241d;
    }

    .hero-canvas-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #162c24;
      touch-action: none;
    }

    #heroCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 55%, rgba(255, 255, 255, 0.025), transparent 36%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.15)),
        linear-gradient(to right, rgba(0, 0, 0, 0.05), transparent 28%, transparent 72%, rgba(0, 0, 0, 0.18));
    }

    .hero-content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 15px 30px 18px;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: auto;
    }

    .brand-pill {
      width: 300px;
      height: 42px;
      background: var(--panel);
      color: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 17px;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.06);
    }

    .menu-icon {
      width: 25px;
      height: 15px;
      display: grid;
      align-content: space-between;
    }

    .menu-icon span {
      display: block;
      height: 1.5px;
      background: #111;
      transform-origin: right center;
    }

    .menu-icon span:nth-child(2) {
      width: 82%;
      margin-left: auto;
    }

    .hero-label {
      position: absolute;
      top: 125px;
      right: 29px;
      margin: 0;
      color: var(--green);
      font-family: "Clash Display", "Inter", sans-serif;
      font-size: clamp(32px, 3.4vw, 52px);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: -0.06em;
      text-transform: uppercase;
    }

    .subtitles {
      position: absolute;
      left: 30px;
      right: 30px;
      top: 41.2%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: end;
      border-bottom: 1px dashed var(--line);
      padding-bottom: 15px;
      color: var(--white);
      text-transform: uppercase;
      font-size: clamp(13px, 1vw, 17px);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.28);
    }

    .subtitles span:nth-child(1) {
      text-align: left;
    }

    .subtitles span:nth-child(2) {
      text-align: center;
    }

    .subtitles span:nth-child(3) {
      text-align: right;
    }

    .hero-title {
      position: absolute;
      left: 28px;
      right: 24px;
      bottom: 130px;
      margin: 0;
      color: var(--white);
      font-family: "Clash Display", "Inter", sans-serif;
      font-size: clamp(78px, 17vw, 320px);
      font-weight: 400;
      line-height: 0.78;
      letter-spacing: -0.095em;
      text-transform: uppercase;
      white-space: nowrap;
      text-align: center;
      text-shadow: 0 6px 40px rgba(0, 0, 0, 0.12);
    }

    .corner-mark {
      position: absolute;
      right: 64px;
      bottom: 180px;
      width: 67px;
      height: 38px;
      transform: skewX(-22deg) rotate(-2deg);
      background: var(--white);
      clip-path: polygon(28% 0, 100% 0, 72% 100%, 0 100%);
      filter: drop-shadow(0 8px 22px rgba(0, 0, 0, 0.16));
    }

    .cta-wrap {
      position: absolute;
      right: 22px;
      bottom: 96px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      pointer-events: auto;
    }

    .cta {
      min-width: 166px;
      height: 42px;
      padding: 0 18px;
      background: #050505;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      background: var(--green);
      color: #050505;
    }

    .cta-plus {
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
      margin-top: -2px;
    }

    @media (max-width: 900px) {
      .hero-content {
        padding: 14px 18px 18px;
      }

      .brand-pill {
        width: 230px;
      }

      .hero-label {
        top: 90px;
        right: 18px;
      }

      .subtitles {
        left: 18px;
        right: 18px;
        top: 42%;
        font-size: 12px;
      }

      .hero-title {
        left: 18px;
        right: 18px;
        bottom: 145px;
        font-size: clamp(72px, 21vw, 170px);
        white-space: normal;
      }

      .corner-mark {
        right: 40px;
        bottom: 220px;
        width: 45px;
        height: 26px;
      }

      .cta-wrap {
        right: 18px;
        bottom: 38px;
      }
    }

    @media (max-width: 560px) {
      .brand-pill {
        width: 190px;
        height: 40px;
        font-size: 14px;
      }

      .hero-label {
        font-size: 34px;
        top: 85px;
      }

      .subtitles {
        top: 36%;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .subtitles span,
      .subtitles span:nth-child(2),
      .subtitles span:nth-child(3) {
        text-align: left;
      }

      .hero-title {
        bottom: 160px;
        text-align: left;
        line-height: 0.9;
        letter-spacing: -0.08em;
      }

      .corner-mark {
        display: none;
      }

      .cta {
        min-width: 150px;
      }
    }
  </style>
</head>

<body>
  <section class="hero" id="hero-home">
    <div class="hero-canvas-wrap">
      <canvas id="heroCanvas"></canvas>
    </div>

    <div class="hero-content">
      <div class="topbar">
        <div class="brand-pill">
          <span>LUMÉA</span>

          <span class="menu-icon" aria-hidden="true">
            <span></span>
            <span></span>
          </span>
        </div>
      </div>

      <h3 class="hero-label">Glow</h3>

      <div class="subtitles">
        <span>Skincare</span>
        <span>Cosmetics</span>
        <span>Beauty</span>
      </div>

      <div class="corner-mark" aria-hidden="true"></div>

      <h1 class="hero-title">LUMÉA</h1>

      <div class="cta-wrap">
        <a href="#" class="cta">
          <span>Shop Collection</span>
          <span class="cta-plus">+</span>
        </a>
      </div>
    </div>
  </section>

  <script>
    const canvas = document.getElementById("heroCanvas");
    const ctx = canvas.getContext("2d", { alpha: false });
    const hero = document.querySelector(".hero");
    const baseLayer = document.createElement("canvas");
    const baseCtx = baseLayer.getContext("2d", { alpha: false });

    const imageUrl = "hero1.png";

    const img = new Image();
    img.src = imageUrl;

    let width = 0;
    let height = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    const pointer = {
      x: 0,
      y: 0,
      tx: 0,
      ty: 0,
      inside: false,
      moved: false,
      radiusRatio: 0.11,
      radius: 0,
      strength: 0,
      lastX: 0,
      lastY: 0,
      velocityX: 0,
      velocityY: 0,
      lastMoveTime: -Infinity
    };

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();

      width = rect.width;
      height = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      baseLayer.width = canvas.width;
      baseLayer.height = canvas.height;
      baseCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      pointer.radius = Math.min(width, height) * pointer.radiusRatio;
    }

    function getCoverRect(image, canvasW, canvasH) {
      const imageRatio = image.width / image.height;
      const canvasRatio = canvasW / canvasH;

      let drawW;
      let drawH;
      let drawX;
      let drawY;

      if (imageRatio > canvasRatio) {
        drawH = canvasH;
        drawW = drawH * imageRatio;
        drawX = (canvasW - drawW) / 2;
        drawY = 0;
      } else {
        drawW = canvasW;
        drawH = drawW / imageRatio;
        drawX = 0;
        drawY = (canvasH - drawH) / 2;
      }

      return { drawX, drawY, drawW, drawH };
    }

    function drawBaseImage(targetCtx) {
      const cover = getCoverRect(img, width, height);

      targetCtx.save();
      targetCtx.clearRect(0, 0, width, height);

      targetCtx.drawImage(img, cover.drawX, cover.drawY, cover.drawW, cover.drawH);

      const gradient = targetCtx.createLinearGradient(0, 0, width, height);
      gradient.addColorStop(0, "rgba(11, 42, 31, 0.42)");
      gradient.addColorStop(0.45, "rgba(0, 0, 0, 0.02)");
      gradient.addColorStop(1, "rgba(0, 0, 0, 0.34)");

      targetCtx.fillStyle = gradient;
      targetCtx.fillRect(0, 0, width, height);

      targetCtx.restore();

      return cover;
    }

    function drawCursorDeformation() {
      if (!pointer.moved) return;

      pointer.x += (pointer.tx - pointer.x) * 0.16;
      pointer.y += (pointer.ty - pointer.y) * 0.16;

      pointer.velocityX = pointer.x - pointer.lastX;
      pointer.velocityY = pointer.y - pointer.lastY;

      pointer.lastX = pointer.x;
      pointer.lastY = pointer.y;

      const now = performance.now();
      const isMoving = pointer.inside && (now - pointer.lastMoveTime < 72);

      pointer.strength += ((isMoving ? 1 : 0) - pointer.strength) * 0.14;

      if (pointer.strength < 0.01) return;

      const time = now * 0.0012;

      const sourceScaleX = baseLayer.width / width;
      const sourceScaleY = baseLayer.height / height;
      const speed = Math.hypot(pointer.velocityX, pointer.velocityY);
      const flow = Math.min(1, speed / 36);

      const rx = pointer.radius * (1 + 0.04 * pointer.strength);
      const ry = pointer.radius * (0.9 + 0.02 * Math.sin(time * 1.1));
      const stripH = 1;
      const swirlStrength = rx * (0.028 + 0.01 * pointer.strength);
      const pressureStrength = rx * (0.017 + 0.01 * flow);
      const trailStrength = 0.28 + flow * 0.34;

      ctx.save();
      ctx.imageSmoothingEnabled = true;
      if ("imageSmoothingQuality" in ctx) {
        ctx.imageSmoothingQuality = "high";
      }

      for (let y = pointer.y - ry; y <= pointer.y + ry; y += stripH) {
        const dy = y - pointer.y;
        const ny = dy / ry;

        if (Math.abs(ny) >= 1) continue;

        const core = Math.max(0, 1 - ny * ny);
        const halfW = rx * Math.sqrt(core);

        if (halfW < 1.2) continue;

        const stripX = pointer.x - halfW;
        const stripW = halfW * 2;
        const falloff = Math.pow(core, 2.5);

        const swirl =
          Math.sin(dy * 0.018 - time * 2.4 + pointer.x * 0.0018) *
          swirlStrength *
          falloff;

        const pressure =
          Math.cos(dy * 0.031 + time * 1.55) *
          pressureStrength *
          falloff;

        const microRipple =
          Math.sin(dy * 0.011 - time * 1.15) *
          (pressureStrength * 0.35) *
          falloff;

        const trailX = pointer.velocityX * trailStrength * falloff;
        const trailY = pointer.velocityY * (trailStrength * 0.1) * falloff;
        const shear = ny * pointer.velocityX * 0.06 * falloff;

        const offsetX = swirl + pressure + microRipple + trailX + shear;
        const offsetY =
          Math.sin(dy * 0.02 - time * 2.1) *
            (ry * 0.012) *
            falloff +
          trailY;

        const sourceX = (stripX - offsetX) * sourceScaleX;
        const sourceY = (y - offsetY) * sourceScaleY;
        const sourceW = stripW * sourceScaleX;
        const sourceH = stripH * sourceScaleY;

        if (
          sourceX < 0 ||
          sourceY < 0 ||
          sourceX + sourceW > baseLayer.width ||
          sourceY + sourceH > baseLayer.height
        ) {
          continue;
        }

        ctx.globalAlpha = 0.92 + falloff * 0.08;

        ctx.drawImage(
          baseLayer,
          sourceX,
          sourceY,
          sourceW,
          sourceH,
          stripX,
          y,
          stripW,
          stripH + 0.2
        );
      }

      ctx.restore();
    }

    function drawNoise() {
      const amount = 90;

      ctx.save();
      ctx.globalAlpha = 0.03;
      ctx.fillStyle = "#fff";

      for (let i = 0; i < amount; i++) {
        const x = Math.random() * width;
        const y = Math.random() * height;
        const s = Math.random() * 1.1;

        ctx.fillRect(x, y, s, s);
      }

      ctx.restore();
    }

    function render() {
      if (img.complete && img.naturalWidth) {
        drawBaseImage(baseCtx);

        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(baseLayer, 0, 0, baseLayer.width, baseLayer.height, 0, 0, width, height);

        drawCursorDeformation();
        drawNoise();
      } else {
        ctx.fillStyle = "#183b2e";
        ctx.fillRect(0, 0, width, height);
      }

      requestAnimationFrame(render);
    }

    function setPointer(event) {
      const rect = canvas.getBoundingClientRect();

      pointer.tx = event.clientX - rect.left;
      pointer.ty = event.clientY - rect.top;
      pointer.moved = true;
      pointer.lastMoveTime = performance.now();
    }

    window.addEventListener("resize", resizeCanvas);

    hero.addEventListener("pointermove", setPointer);

    hero.addEventListener("pointerenter", function (event) {
      pointer.inside = true;
      const rect = canvas.getBoundingClientRect();
      pointer.tx = event.clientX - rect.left;
      pointer.ty = event.clientY - rect.top;
    });

    hero.addEventListener("pointerleave", function () {
      pointer.inside = false;
    });

    img.onload = function () {
      resizeCanvas();
    };

    resizeCanvas();
    render();
  </script>
</body>
</html>
