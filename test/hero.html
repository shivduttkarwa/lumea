<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L'Oiseau Dé Hero Replica</title>

  <style>
    @import url("https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap");

    :root {
      --white: #ffffff;
      --black: #050505;
      --green: #c7f099;
      --line: rgba(255, 255, 255, 0.72);
      --panel: rgba(255, 255, 255, 0.96);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #111;
      font-family: "Inter", system-ui, sans-serif;
      overflow-x: hidden;
    }

    body {
      cursor: none;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background: #13241d;
    }

    .hero-canvas-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #162c24;
      touch-action: none;
    }

    #heroCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 55%, rgba(255,255,255,0.03), transparent 36%),
        linear-gradient(to bottom, rgba(0,0,0,0.04), rgba(0,0,0,0.15)),
        linear-gradient(to right, rgba(0,0,0,0.05), transparent 28%, transparent 72%, rgba(0,0,0,0.18));
    }

    .hero-content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 15px 30px 18px;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: auto;
    }

    .brand-pill {
      width: 300px;
      height: 42px;
      background: var(--panel);
      color: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 17px;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.06);
    }

    .menu-icon {
      width: 25px;
      height: 15px;
      display: grid;
      align-content: space-between;
    }

    .menu-icon span {
      display: block;
      height: 1.5px;
      background: #111;
      transform-origin: right center;
    }

    .menu-icon span:nth-child(2) {
      width: 82%;
      margin-left: auto;
    }

    .paradis {
      position: absolute;
      top: 125px;
      right: 29px;
      margin: 0;
      color: var(--green);
      font-family: "Clash Display", "Inter", sans-serif;
      font-size: clamp(32px, 3.4vw, 52px);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: -0.06em;
      text-transform: uppercase;
    }

    .subtitles {
      position: absolute;
      left: 30px;
      right: 30px;
      top: 41.2%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: end;
      border-bottom: 1px dashed var(--line);
      padding-bottom: 15px;
      color: var(--white);
      text-transform: uppercase;
      font-size: clamp(13px, 1vw, 17px);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.28);
    }

    .subtitles span:nth-child(1) {
      text-align: left;
    }

    .subtitles span:nth-child(2) {
      text-align: center;
    }

    .subtitles span:nth-child(3) {
      text-align: right;
    }

    .hero-title {
      position: absolute;
      left: 28px;
      right: 24px;
      bottom: 130px;
      margin: 0;
      color: var(--white);
      font-family: "Clash Display", "Inter", sans-serif;
      font-size: clamp(72px, 15.2vw, 294px);
      font-weight: 400;
      line-height: 0.78;
      letter-spacing: -0.095em;
      text-transform: uppercase;
      white-space: nowrap;
      text-align: center;
      text-shadow: 0 6px 40px rgba(0, 0, 0, 0.12);
    }

    .corner-mark {
      position: absolute;
      right: 64px;
      bottom: 180px;
      width: 67px;
      height: 38px;
      transform: skewX(-22deg) rotate(-2deg);
      background: var(--white);
      clip-path: polygon(28% 0, 100% 0, 72% 100%, 0 100%);
      filter: drop-shadow(0 8px 22px rgba(0, 0, 0, 0.16));
    }

    .cta-wrap {
      position: absolute;
      right: 22px;
      bottom: 96px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .cta {
      width: 166px;
      height: 42px;
      background: #050505;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
      pointer-events: auto;
    }

    .cta:hover {
      transform: translateY(-2px);
      background: var(--green);
      color: #050505;
    }

    .cta-plus {
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
      margin-top: -2px;
    }

    .framer-badge {
      height: 35px;
      min-width: 137px;
      padding: 0 12px;
      border-radius: 9px;
      background: #fff;
      color: #161616;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.16);
      pointer-events: auto;
    }

    .framer-icon {
      width: 18px;
      height: 18px;
      background: #111;
      border-radius: 4px;
      clip-path: polygon(0 0, 100% 0, 60% 34%, 100% 34%, 100% 100%, 0 55%);
    }

    .custom-cursor {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 9999;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      pointer-events: none;
      transform: translate3d(-50%, -50%, 0);
      border: 1px solid rgba(255, 255, 255, 0.75);
      mix-blend-mode: difference;
      opacity: 0;
      transition: opacity 0.2s ease, width 0.25s ease, height 0.25s ease;
    }

    .custom-cursor.is-active {
      opacity: 1;
    }

    .custom-cursor.is-hover {
      width: 48px;
      height: 48px;
    }

    @media (max-width: 900px) {
      .hero-content {
        padding: 14px 18px 18px;
      }

      .brand-pill {
        width: 230px;
      }

      .paradis {
        top: 90px;
        right: 18px;
      }

      .subtitles {
        left: 18px;
        right: 18px;
        top: 42%;
        font-size: 12px;
      }

      .hero-title {
        left: 18px;
        right: 18px;
        bottom: 145px;
        font-size: clamp(64px, 18vw, 150px);
        white-space: normal;
      }

      .corner-mark {
        right: 40px;
        bottom: 220px;
        width: 45px;
        height: 26px;
      }

      .cta-wrap {
        right: 18px;
        bottom: 38px;
      }
    }

    @media (max-width: 560px) {
      body {
        cursor: auto;
      }

      .custom-cursor {
        display: none;
      }

      .brand-pill {
        width: 190px;
        height: 40px;
        font-size: 14px;
      }

      .paradis {
        font-size: 34px;
        top: 85px;
      }

      .subtitles {
        top: 36%;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .subtitles span,
      .subtitles span:nth-child(2),
      .subtitles span:nth-child(3) {
        text-align: left;
      }

      .hero-title {
        bottom: 160px;
        text-align: left;
        line-height: 0.9;
        letter-spacing: -0.08em;
      }

      .corner-mark {
        display: none;
      }

      .cta {
        width: 150px;
      }
    }
  </style>
</head>

<body>
  <section class="hero" id="hero-home">
    <div class="hero-canvas-wrap">
      <canvas id="heroCanvas"></canvas>
    </div>

    <div class="hero-content">
      <div class="topbar">
        <div class="brand-pill">
          <span>L'OISEAU DÉ</span>
          <span class="menu-icon" aria-hidden="true">
            <span></span>
            <span></span>
          </span>
        </div>
      </div>

      <h3 class="paradis">Paradis</h3>

      <div class="subtitles">
        <span>E-commerce</span>
        <span>Cosmetics</span>
        <span>Beauty</span>
      </div>

      <div class="corner-mark" aria-hidden="true"></div>

      <h1 class="hero-title">L'OISEAU DÉ</h1>

      <div class="cta-wrap">
        <a href="#" class="cta">
          <span>Get for free</span>
          <span class="cta-plus">+</span>
        </a>

        <a href="#" class="framer-badge">
          <span class="framer-icon"></span>
          <span>Made in Framer</span>
        </a>
      </div>
    </div>
  </section>

  <div class="custom-cursor" id="customCursor"></div>

  <script>
    const canvas = document.getElementById("heroCanvas");
    const ctx = canvas.getContext("2d", { alpha: false });
    const cursor = document.getElementById("customCursor");
    const hero = document.querySelector(".hero");

    const imageUrl =
      "https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=2400&q=90";

    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = imageUrl;

    let width = 0;
    let height = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    const pointer = {
      x: 0,
      y: 0,
      tx: 0,
      ty: 0,
      active: false,
      moved: false,
      radius: 135,
      strength: 0
    };

    const trail = [];

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      width = rect.width;
      height = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function getCoverRect(image, canvasW, canvasH) {
      const imageRatio = image.width / image.height;
      const canvasRatio = canvasW / canvasH;

      let drawW;
      let drawH;
      let drawX;
      let drawY;

      if (imageRatio > canvasRatio) {
        drawH = canvasH;
        drawW = drawH * imageRatio;
        drawX = (canvasW - drawW) / 2;
        drawY = 0;
      } else {
        drawW = canvasW;
        drawH = drawW / imageRatio;
        drawX = 0;
        drawY = (canvasH - drawH) / 2;
      }

      return { drawX, drawY, drawW, drawH };
    }

    function drawBaseImage() {
      const cover = getCoverRect(img, width, height);

      ctx.save();

      ctx.drawImage(img, cover.drawX, cover.drawY, cover.drawW, cover.drawH);

      const gradient = ctx.createLinearGradient(0, 0, width, height);
      gradient.addColorStop(0, "rgba(11, 42, 31, 0.42)");
      gradient.addColorStop(0.45, "rgba(0, 0, 0, 0.02)");
      gradient.addColorStop(1, "rgba(0, 0, 0, 0.34)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      ctx.restore();

      return cover;
    }

    function drawCursorLens(cover) {
      if (!pointer.moved) return;

      pointer.x += (pointer.tx - pointer.x) * 0.13;
      pointer.y += (pointer.ty - pointer.y) * 0.13;

      pointer.strength += ((pointer.active ? 1 : 0) - pointer.strength) * 0.08;

      const r = pointer.radius * pointer.strength;
      if (r < 2) return;

      trail.unshift({
        x: pointer.x,
        y: pointer.y,
        r,
        a: 0.32 * pointer.strength
      });

      if (trail.length > 8) trail.pop();

      for (let i = trail.length - 1; i >= 0; i--) {
        const t = trail[i];
        const fade = t.a * (1 - i / trail.length);
        const rr = t.r * (1 - i * 0.045);

        ctx.save();
        ctx.globalAlpha = fade;
        ctx.beginPath();
        ctx.arc(t.x, t.y, rr, 0, Math.PI * 2);
        ctx.clip();

        const dx = (t.x - width / 2) * 0.018;
        const dy = (t.y - height / 2) * 0.018;

        ctx.drawImage(
          img,
          cover.drawX - dx,
          cover.drawY - dy,
          cover.drawW * 1.018,
          cover.drawH * 1.018
        );

        ctx.restore();
      }

      ctx.save();

      ctx.beginPath();
      ctx.arc(pointer.x, pointer.y, r, 0, Math.PI * 2);
      ctx.clip();

      const wobbleX = Math.sin(Date.now() * 0.002) * 7;
      const wobbleY = Math.cos(Date.now() * 0.0024) * 7;

      ctx.globalAlpha = 0.72;
      ctx.drawImage(
        img,
        cover.drawX - (pointer.x - width / 2) * 0.035 + wobbleX,
        cover.drawY - (pointer.y - height / 2) * 0.035 + wobbleY,
        cover.drawW * 1.045,
        cover.drawH * 1.045
      );

      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = 0.18;
      ctx.drawImage(
        img,
        cover.drawX + 8,
        cover.drawY,
        cover.drawW,
        cover.drawH
      );

      ctx.globalCompositeOperation = "multiply";
      ctx.globalAlpha = 0.10;
      ctx.drawImage(
        img,
        cover.drawX - 8,
        cover.drawY,
        cover.drawW,
        cover.drawH
      );

      ctx.restore();

      ctx.save();

      const ring = ctx.createRadialGradient(
        pointer.x,
        pointer.y,
        r * 0.35,
        pointer.x,
        pointer.y,
        r
      );

      ring.addColorStop(0, "rgba(255,255,255,0)");
      ring.addColorStop(0.72, "rgba(255,255,255,0.02)");
      ring.addColorStop(0.88, "rgba(255,255,255,0.18)");
      ring.addColorStop(1, "rgba(255,255,255,0)");

      ctx.fillStyle = ring;
      ctx.beginPath();
      ctx.arc(pointer.x, pointer.y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.26)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(pointer.x, pointer.y, r * 0.98, 0, Math.PI * 2);
      ctx.stroke();

      ctx.restore();
    }

    function drawNoise() {
      const amount = 100;
      ctx.save();
      ctx.globalAlpha = 0.045;
      ctx.fillStyle = "#fff";

      for (let i = 0; i < amount; i++) {
        const x = Math.random() * width;
        const y = Math.random() * height;
        const s = Math.random() * 1.2;
        ctx.fillRect(x, y, s, s);
      }

      ctx.restore();
    }

    function render() {
      if (img.complete && img.naturalWidth) {
        const cover = drawBaseImage();
        drawCursorLens(cover);
        drawNoise();
      } else {
        ctx.fillStyle = "#183b2e";
        ctx.fillRect(0, 0, width, height);
      }

      requestAnimationFrame(render);
    }

    function setPointer(event) {
      const rect = canvas.getBoundingClientRect();

      pointer.tx = event.clientX - rect.left;
      pointer.ty = event.clientY - rect.top;
      pointer.active = true;
      pointer.moved = true;

      cursor.classList.add("is-active");
      cursor.style.transform =
        "translate3d(" + event.clientX + "px," + event.clientY + "px,0) translate(-50%, -50%)";
    }

    window.addEventListener("resize", resizeCanvas);

    hero.addEventListener("pointermove", setPointer);

    hero.addEventListener("pointerenter", function (event) {
      pointer.active = true;
      setPointer(event);
    });

    hero.addEventListener("pointerleave", function () {
      pointer.active = false;
      cursor.classList.remove("is-active");
    });

    document.querySelectorAll("a, button, .brand-pill").forEach((el) => {
      el.addEventListener("pointerenter", () => cursor.classList.add("is-hover"));
      el.addEventListener("pointerleave", () => cursor.classList.remove("is-hover"));
    });

    img.onload = function () {
      resizeCanvas();
    };

    resizeCanvas();
    render();
  </script>
</body>
</html>
