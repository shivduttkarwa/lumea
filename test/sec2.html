<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Luméa Curated Pieces Section</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap");
    @import url("https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600&display=swap");

    :root {
      --lumea-black: #111111;
      --lumea-white: #ffffff;
      --lumea-soft: #f7f3ec;
      --lumea-green: #c7f099;
      --lumea-duration: 900ms;
      --lumea-ease: cubic-bezier(0.19, 1, 0.22, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--lumea-white);
      color: var(--lumea-black);
      font-family: "Inter", system-ui, sans-serif;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .lumea-curated {
      width: 100%;
      margin-top: 60px;
      background: var(--lumea-white);
    }

    .lumea-curated-heading {
      padding: 32px 60px;
      font-family: "Clash Display", "Inter", sans-serif;
      font-size: clamp(34px, 4vw, 72px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.07em;
      text-transform: uppercase;
    }

    .lumea-curated-row {
      display: flex;
      width: 100%;
      height: 100vh;
      min-height: 720px;
    }

    .lumea-product-tile {
      position: relative;
      width: 50%;
      height: 100%;
      overflow: hidden;
      display: block;
      background: #dfe5e1;
      isolation: isolate;
    }

    .lumea-product-image-wrap {
      width: 100%;
      height: 100%;
      overflow: hidden;
      transform: scale(1.055);
      transform-origin: top right;
      transition:
        transform var(--lumea-duration) var(--lumea-ease),
        filter var(--lumea-duration) var(--lumea-ease);
      will-change: transform;
    }

    .lumea-product-image {
      width: 100%;
      height: 112%;
      object-fit: cover;
      object-position: top center;
      display: block;
      transform: translate3d(0, -8%, 0) scale(1.1);
      transform-origin: top right;
      transition:
        transform var(--lumea-duration) var(--lumea-ease),
        filter var(--lumea-duration) var(--lumea-ease);
      will-change: transform;
      user-select: none;
      pointer-events: none;
    }

    .lumea-product-tile:hover .lumea-product-image-wrap {
      transform: scale(1);
    }

    .lumea-product-tile:hover .lumea-product-image {
      transform: translate3d(0, -5%, 0) scale(1.04);
      filter: saturate(0.95) contrast(0.96);
    }

    .lumea-bottom-overlay {
      position: absolute;
      left: 0;
      bottom: 0;
      z-index: 3;
      width: 100%;
      height: 42%;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.68) 0%,
        rgba(0, 0, 0, 0.46) 34%,
        rgba(0, 0, 0, 0.18) 70%,
        rgba(0, 0, 0, 0) 100%
      );
      opacity: 0;
      transform: translateY(18%);
      transition:
        opacity 520ms ease,
        transform 750ms var(--lumea-ease);
      pointer-events: none;
    }

    .lumea-product-tile:hover .lumea-bottom-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .lumea-product-info {
      position: absolute;
      left: 50%;
      bottom: 40px;
      z-index: 5;
      width: 100%;
      max-width: 520px;
      padding: 0 24px;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
      pointer-events: none;
    }

    .lumea-product-meta {
      text-align: center;
      color: var(--lumea-white);
      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity 450ms ease,
        transform 650ms var(--lumea-ease);
      transition-delay: 40ms;
      text-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }

    .lumea-product-tile:hover .lumea-product-meta {
      opacity: 1;
      transform: translateY(0);
    }

    .lumea-product-name {
      margin: 0 0 8px;
      font-family: "Clash Display", "Inter", sans-serif;
      font-size: clamp(28px, 3vw, 56px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.065em;
      text-transform: uppercase;
    }

    .lumea-product-price {
      margin: 0;
      font-family: "Courier New", monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .lumea-product-desc {
      max-width: 360px;
      margin: 12px auto 0;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.82);
    }

    .lumea-buy-wrap {
      display: flex;
      width: 100%;
      justify-content: center;
      opacity: 0;
      transform: translateY(12px);
      transition:
        opacity 400ms ease,
        transform 550ms var(--lumea-ease);
      pointer-events: none;
    }

    .lumea-product-tile:hover .lumea-buy-wrap {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .lumea-buy-button {
      min-width: 220px;
      padding: 17px 36px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      background: var(--lumea-white);
      color: var(--lumea-black);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter", system-ui, sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition:
        background 250ms ease,
        color 250ms ease,
        border-color 250ms ease,
        transform 250ms ease;
    }

    .lumea-buy-button:hover {
      background: var(--lumea-green);
      color: var(--lumea-black);
      border-color: var(--lumea-green);
      transform: translateY(-2px);
    }

    .lumea-product-tile::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0) 45%,
        rgba(0, 0, 0, 0.12) 100%
      );
      pointer-events: none;
      opacity: 1;
      transition: opacity 450ms ease;
    }

    .lumea-product-tile:hover::after {
      opacity: 0;
    }

    @media (max-width: 1024px) {
      .lumea-curated {
        margin-top: 40px;
      }

      .lumea-curated-heading {
        padding: 28px 24px;
      }

      .lumea-curated-row {
        height: auto;
        min-height: 0;
        flex-direction: column;
      }

      .lumea-product-tile {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
      }

      .lumea-bottom-overlay {
        opacity: 1;
        transform: translateY(0);
        height: 46%;
      }

      .lumea-product-meta,
      .lumea-buy-wrap {
        opacity: 1;
        transform: none;
      }

      .lumea-product-image-wrap {
        transform: scale(1);
      }

      .lumea-product-image {
        height: 112%;
        transform: translate3d(0, -7%, 0) scale(1.06);
      }

      .lumea-product-tile:hover .lumea-product-image {
        transform: translate3d(0, -7%, 0) scale(1.06);
      }

      .lumea-product-info {
        bottom: 28px;
        gap: 18px;
      }
    }

    @media (max-width: 560px) {
      .lumea-curated-heading {
        padding: 24px 18px;
        font-size: 38px;
      }

      .lumea-product-name {
        font-size: 34px;
      }

      .lumea-product-desc {
        display: none;
      }

      .lumea-buy-button {
        min-width: 190px;
        padding: 15px 28px;
        font-size: 14px;
      }

      .lumea-product-info {
        bottom: 22px;
      }
    }
  </style>
</head>

<body>
  <section class="lumea-curated">
    <div class="lumea-curated-heading">Curated Glow</div>

    <div class="lumea-curated-row">
      <a class="lumea-product-tile" href="#">
        <div class="lumea-product-image-wrap">
          <img
            class="lumea-product-image"
            src="https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?auto=format&fit=crop&w=1800&q=90"
            alt="Luméa botanical serum editorial"
          />
        </div>

        <div class="lumea-bottom-overlay"></div>

        <div class="lumea-product-info">
          <div class="lumea-product-meta">
            <h3 class="lumea-product-name">Radiance Serum</h3>
            <p class="lumea-product-price">$48.00</p>
            <p class="lumea-product-desc">
              A lightweight botanical serum for dewy, luminous, everyday skin.
            </p>
          </div>

          <div class="lumea-buy-wrap">
            <button class="lumea-buy-button" type="button">Buy Now</button>
          </div>
        </div>
      </a>

      <a class="lumea-product-tile" href="#">
        <div class="lumea-product-image-wrap">
          <img
            class="lumea-product-image"
            src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?auto=format&fit=crop&w=1800&q=90"
            alt="Luméa cream and skincare editorial"
          />
        </div>

        <div class="lumea-bottom-overlay"></div>

        <div class="lumea-product-info">
          <div class="lumea-product-meta">
            <h3 class="lumea-product-name">Velvet Cream</h3>
            <p class="lumea-product-price">$42.00</p>
            <p class="lumea-product-desc">
              Rich daily moisture with a soft-touch finish and botanical comfort.
            </p>
          </div>

          <div class="lumea-buy-wrap">
            <button class="lumea-buy-button" type="button">Buy Now</button>
          </div>
        </div>
      </a>
    </div>
  </section>
</body>
</html>
