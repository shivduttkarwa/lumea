<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luméa Buttons</title>

  <style>
    :root {
      --lumea-bg: #fffaf7;
      --lumea-surface: #ffffff;
      --lumea-text: #241816;
      --lumea-muted: #7d6b66;
      --lumea-accent: #c98578;
      --lumea-accent-dark: #8f4d43;
      --lumea-fresh: #c7f099;
      --lumea-border: rgba(36, 24, 22, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--lumea-bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--lumea-text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .button-wrapper {
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
    }

    .button-box {
      width: 100%;
      max-width: 520px;
      padding: 28px;
      background: var(--lumea-surface);
      border: 1px solid var(--lumea-border);
      border-radius: 20px;
      text-align: center;
    }

    .button-label {
      margin-bottom: 16px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--lumea-muted);
    }

    .lumea-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 156px;
      height: 46px;
      padding: 0 24px;
      border-radius: 999px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--lumea-text);
      background: transparent;
      transition:
        background-color 0.25s ease,
        color 0.25s ease,
        border-color 0.25s ease,
        transform 0.25s ease;
    }

    .lumea-btn:hover {
      transform: translateY(-1px);
    }

    .lumea-btn:focus-visible {
      outline: 1px solid var(--lumea-accent-dark);
      outline-offset: 4px;
    }

    /* Button 01 — Dark Primary */
    .btn-dark {
      background: var(--lumea-text);
      color: var(--lumea-surface);
      border-color: var(--lumea-text);
    }

    .btn-dark:hover {
      background: #3a2926;
      border-color: #3a2926;
    }

    /* Button 02 — Accent */
    .btn-accent {
      background: var(--lumea-accent);
      color: var(--lumea-surface);
      border-color: var(--lumea-accent);
    }

    .btn-accent:hover {
      background: var(--lumea-accent-dark);
      border-color: var(--lumea-accent-dark);
    }

    /* Button 03 — White Outline */
    .btn-outline {
      background: var(--lumea-surface);
      color: var(--lumea-text);
      border-color: var(--lumea-border);
    }

    .btn-outline:hover {
      border-color: var(--lumea-text);
      background: var(--lumea-surface);
    }

    @media (max-width: 600px) {
      .button-box {
        padding: 24px 18px;
      }

      .lumea-btn {
        width: 100%;
        max-width: 280px;
      }
    }
  </style>
</head>

<body>

  <div class="button-wrapper">

    <!-- Button 01 -->
    <div class="button-box">
      <p class="button-label">Primary Button</p>
      <a href="#" class="lumea-btn btn-dark">Shop Now</a>
    </div>

    <!-- Button 02 -->
    <div class="button-box">
      <p class="button-label">Accent Button</p>
      <a href="#" class="lumea-btn btn-accent">Add to Bag</a>
    </div>

    <!-- Button 03 -->
    <div class="button-box">
      <p class="button-label">Outline Button</p>
      <a href="#" class="lumea-btn btn-outline">View Product</a>
    </div>

  </div>

</body>
</html>
