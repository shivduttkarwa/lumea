<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Beauty Buttons</title>

  <style>
    :root {
      --bg: #ffffff;
      --black: #111111;
      --soft-black: #222222;
      --text-muted: #6f6f6f;
      --border: #d8d8d8;
      --border-dark: #111111;
      --cream: #f7f5f0;
      --transition: 0.28s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--black);
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    .section {
      min-height: 100vh;
      padding: 80px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .inner {
      width: 100%;
      max-width: 980px;
      text-align: center;
    }

    .eyebrow {
      margin-bottom: 14px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(38px, 6vw, 72px);
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 18px;
    }

    .subtitle {
      max-width: 520px;
      margin: 0 auto 56px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-muted);
    }

    .button-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      height: 48px;
      padding: 0 26px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--black);
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 
        background var(--transition),
        color var(--transition),
        border-color var(--transition),
        transform var(--transition);
    }

    .btn:focus-visible {
      outline: 1px solid var(--black);
      outline-offset: 4px;
    }

    /* 1. Primary filled button */
    .btn-primary {
      background: var(--black);
      color: #ffffff;
      border-color: var(--black);
    }

    .btn-primary:hover {
      background: var(--soft-black);
      border-color: var(--soft-black);
      transform: translateY(-1px);
    }

    /* 2. Clean outline button */
    .btn-outline {
      border-color: var(--border-dark);
      color: var(--black);
    }

    .btn-outline:hover {
      background: var(--black);
      color: #ffffff;
      transform: translateY(-1px);
    }

    /* 3. Soft cream button */
    .btn-soft {
      background: var(--cream);
      color: var(--black);
      border-color: var(--cream);
    }

    .btn-soft:hover {
      background: #efebe3;
      border-color: #efebe3;
      transform: translateY(-1px);
    }

    /* 4. Underline text button */
    .btn-text {
      min-width: auto;
      height: auto;
      padding: 8px 2px;
      border: none;
      color: var(--black);
    }

    .btn-text::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 2px;
      width: 100%;
      height: 1px;
      background: var(--black);
      transform: scaleX(1);
      transform-origin: left;
      opacity: 0.35;
      transition: opacity var(--transition);
    }

    .btn-text:hover::after {
      opacity: 1;
    }

    /* 5. Subtle icon button */
    .btn-icon {
      border-color: var(--border);
      gap: 12px;
    }

    .btn-icon span {
      font-size: 14px;
      line-height: 1;
      transition: transform var(--transition);
    }

    .btn-icon:hover {
      border-color: var(--black);
      transform: translateY(-1px);
    }

    .btn-icon:hover span {
      transform: translateX(3px);
    }

    @media (max-width: 768px) {
      .section {
        padding: 60px 18px;
      }

      .button-row {
        flex-direction: column;
        gap: 14px;
      }

      .btn {
        width: 100%;
        max-width: 300px;
      }

      .btn-text {
        width: auto;
      }
    }
  </style>
</head>

<body>

  <section class="section">
    <div class="inner">

      <p class="eyebrow">Minimal CTA Styles</p>

      <h1>Professional Beauty Buttons</h1>

      <p class="subtitle">
        Clean, subtle and premium button styles suitable for skincare,
        cosmetics, fragrance and luxury beauty product websites.
      </p>

      <div class="button-row">

        <a href="#" class="btn btn-primary">Shop Now</a>

        <a href="#" class="btn btn-outline">View Product</a>

        <a href="#" class="btn btn-soft">Add to Bag</a>

        <a href="#" class="btn btn-text">Learn More</a>

        <a href="#" class="btn btn-icon">
          Explore
          <span>→</span>
        </a>

      </div>

    </div>
  </section>

</body>
</html>
