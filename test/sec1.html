<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Luméa Editorial Slider</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap");

    @font-face {
      font-family: "LumeaDisplay";
      src: local("Didot"), local("Bodoni 72"), local("Times New Roman");
    }

    :root {
      --lumea-black: #111111;
      --lumea-white: #ffffff;
      --lumea-glass: rgba(255, 255, 255, 0.34);
      --lumea-border: rgba(17, 17, 17, 0.92);
      --lumea-ease: cubic-bezier(0.19, 1, 0.22, 1);
      --lumea-duration: 1280ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      color: var(--lumea-black);
      font-family: "Inter", system-ui, sans-serif;
      overflow-x: hidden;
    }

    .lumea-slider-section {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 720px;
      background: #ffffff;
      overflow: hidden;
    }

    .lumea-slider-stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: none;
      user-select: none;
      contain: layout paint;
      background: #ffffff;
    }

    .lumea-slides {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .lumea-slide {
      position: absolute;
      top: 0;
      left: 50%;
      width: 34vw;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform:
        translate3d(calc(-50% + var(--x, 0vw)), 0, 0)
        scale(var(--slide-scale, 1));
      transition:
        transform var(--lumea-duration) var(--lumea-ease),
        opacity 850ms var(--lumea-ease),
        filter 850ms var(--lumea-ease);
      will-change: transform, opacity;
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .lumea-slide.is-active,
    .lumea-slide.is-prev,
    .lumea-slide.is-next {
      opacity: 1;
    }

    .lumea-slide.is-active {
      --x: 0vw;
      --slide-scale: 1;
      z-index: 5;
      filter: saturate(1);
    }

    .lumea-slide.is-prev {
      --x: -58vw;
      --slide-scale: 0.985;
      z-index: 2;
      filter: saturate(0.9);
    }

    .lumea-slide.is-next {
      --x: 58vw;
      --slide-scale: 0.985;
      z-index: 2;
      filter: saturate(0.9);
    }

    .lumea-slide.is-hidden-left {
      --x: -112vw;
      --slide-scale: 0.96;
      z-index: 1;
      opacity: 0;
    }

    .lumea-slide.is-hidden-right {
      --x: 112vw;
      --slide-scale: 0.96;
      z-index: 1;
      opacity: 0;
    }

    .lumea-slide-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translate3d(0, 0, 0) scale(var(--image-scale, 1.08));
      transition: transform var(--lumea-duration) var(--lumea-ease);
      will-change: transform;
      backface-visibility: hidden;
      transform-origin: center center;
    }

    .lumea-slide.is-active .lumea-slide-inner {
      --image-scale: 1;
    }

    .lumea-slide.is-prev .lumea-slide-inner,
    .lumea-slide.is-next .lumea-slide-inner {
      --image-scale: 1.08;
    }

    .lumea-slide.is-hidden-left .lumea-slide-inner,
    .lumea-slide.is-hidden-right .lumea-slide-inner {
      --image-scale: 1.16;
    }

    .lumea-slide img {
      width: 100%;
      max-width: 680px;
      height: 82vh;
      max-height: 790px;
      object-fit: cover;
      display: block;
      pointer-events: none;
      user-select: none;
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
    }

    .lumea-hit-area {
      position: absolute;
      inset: 0;
      z-index: 16;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .lumea-hit-area button {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: none;
    }

    .lumea-content-card {
      position: absolute;
      top: 38%;
      left: 64%;
      z-index: 22;
      width: min(340px, 58vw);
      min-height: 440px;
      display: flex;
      flex-direction: column;
      transform: translate3d(-8%, 0, 0);
      border: 1px solid var(--lumea-border);
      background: var(--lumea-glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 18px 56px rgba(0, 0, 0, 0.08);
      transition:
        opacity 520ms ease,
        transform 520ms var(--lumea-ease);
      pointer-events: auto;
      will-change: opacity, transform;
    }

    .lumea-content-card.is-changing {
      opacity: 0;
      transform: translate3d(-8%, 18px, 0);
    }

    .lumea-card-body {
      flex: 1 1 auto;
      padding: 48px 24px 34px;
    }

    .lumea-slide-number {
      display: block;
      font-family: "LumeaDisplay", "Times New Roman", serif;
      font-size: clamp(86px, 7.2vw, 132px);
      font-weight: 400;
      line-height: 0.72;
      letter-spacing: -0.09em;
      margin: 0 0 34px;
    }

    .lumea-card-text {
      max-width: 250px;
      margin: 0;
      font-family: "Courier New", monospace;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
      letter-spacing: -0.03em;
    }

    .lumea-card-button {
      flex: 0 0 auto;
      display: block;
      width: 100%;
      padding: 14px 18px;
      border-top: 1px solid var(--lumea-border);
      color: var(--lumea-black);
      font-family: "Courier New", monospace;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      transition:
        background 250ms ease,
        color 250ms ease;
    }

    .lumea-card-button:hover {
      background: var(--lumea-black);
      color: var(--lumea-white);
    }

    .lumea-cursor-arrow {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 90;
      width: 130px;
      height: 28px;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-50%, -50%, 0) scale(0.7);
      transition:
        opacity 180ms ease,
        transform 180ms ease;
      will-change: transform, opacity;
    }

    .lumea-cursor-arrow.is-visible {
      opacity: 1;
    }

    .lumea-cursor-arrow.is-left {
      transform: translate3d(-50%, -50%, 0) scale(1) rotate(180deg);
    }

    .lumea-cursor-arrow.is-right {
      transform: translate3d(-50%, -50%, 0) scale(1) rotate(0deg);
    }

    .lumea-cursor-arrow::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--lumea-black);
      transform: translateY(-50%);
    }

    .lumea-cursor-arrow::after {
      content: "";
      position: absolute;
      right: 0;
      top: 50%;
      width: 13px;
      height: 13px;
      border-top: 1px solid var(--lumea-black);
      border-right: 1px solid var(--lumea-black);
      transform: translateY(-50%) rotate(45deg);
    }

    .lumea-mobile-arrows {
      position: absolute;
      left: 50%;
      bottom: 34px;
      z-index: 35;
      width: min(420px, 84vw);
      display: none;
      justify-content: space-between;
      transform: translateX(-50%);
      pointer-events: auto;
    }

    .lumea-mobile-arrow {
      width: 92px;
      height: 34px;
      border: 0;
      background: transparent;
      position: relative;
      cursor: pointer;
    }

    .lumea-mobile-arrow::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--lumea-black);
    }

    .lumea-mobile-arrow::after {
      content: "";
      position: absolute;
      right: 0;
      top: 50%;
      width: 11px;
      height: 11px;
      border-top: 1px solid var(--lumea-black);
      border-right: 1px solid var(--lumea-black);
      transform: translateY(-50%) rotate(45deg);
    }

    .lumea-mobile-arrow--prev {
      opacity: 0.4;
      transform: rotate(180deg);
    }

    .lumea-slider-stage.is-loading .lumea-slide,
    .lumea-slider-stage.is-loading .lumea-slide-inner {
      transition: none;
      animation: none;
    }

    @media (max-width: 1200px) {
      .lumea-slider-stage {
        cursor: auto;
      }

      .lumea-hit-area,
      .lumea-cursor-arrow {
        display: none;
      }

      .lumea-mobile-arrows {
        display: flex;
      }

      .lumea-slide {
        width: 50vw;
      }

      .lumea-slide.is-prev {
        --x: -68vw;
      }

      .lumea-slide.is-next {
        --x: 68vw;
      }
    }

    @media (max-width: 768px) {
      .lumea-slider-section {
        min-height: 780px;
        height: 92vh;
      }

      .lumea-slide {
        width: 78vw;
        align-items: flex-start;
        padding-top: 40px;
      }

      .lumea-slide img {
        height: 45vh;
        max-height: 460px;
      }

      .lumea-slide.is-prev {
        --x: -102vw;
      }

      .lumea-slide.is-next {
        --x: 102vw;
      }

      .lumea-content-card {
        top: 49%;
        left: 62%;
        width: min(300px, calc(100vw - 44px));
        min-height: 350px;
        transform: translate3d(-36%, 0, 0);
      }

      .lumea-content-card.is-changing {
        transform: translate3d(-36%, 18px, 0);
      }

      .lumea-card-body {
        padding: 26px 22px 20px;
      }

      .lumea-slide-number {
        font-size: 84px;
        margin-bottom: 28px;
      }

      .lumea-card-text {
        font-size: 13px;
      }

      .lumea-card-button {
        padding: 13px 16px;
        font-size: 13px;
      }

      .lumea-mobile-arrows {
        bottom: 72px;
      }
    }

    @media (max-width: 480px) {
      .lumea-slider-section {
        min-height: 720px;
      }

      .lumea-slide {
        width: 86vw;
      }

      .lumea-content-card {
        top: 52%;
        left: 61%;
        width: min(278px, calc(100vw - 36px));
        min-height: 330px;
        transform: translate3d(-36%, 0, 0);
      }

      .lumea-content-card.is-changing {
        transform: translate3d(-36%, 18px, 0);
      }

      .lumea-slide-number {
        font-size: 72px;
      }

      .lumea-card-body {
        padding: 22px 18px 18px;
      }

      .lumea-mobile-arrows {
        bottom: 44px;
      }
    }
  </style>
</head>

<body>
  <section class="lumea-slider-section" aria-label="Luméa editorial product drops">
    <div class="lumea-slider-stage is-loading" id="lumeaSlider">
      <div class="lumea-slides" id="lumeaSlides"></div>

      <div class="lumea-hit-area" aria-hidden="true">
        <button type="button" data-direction="prev"></button>
        <button type="button" data-direction="next"></button>
      </div>

      <article class="lumea-content-card" id="lumeaCard">
        <div class="lumea-card-body">
          <span class="lumea-slide-number" id="lumeaNumber">01</span>
          <p class="lumea-card-text" id="lumeaText">
            Botanical skincare rituals designed for luminous skin, soft texture, and everyday radiance.
          </p>
        </div>

        <a href="#" class="lumea-card-button">Shop All</a>
      </article>

      <div class="lumea-mobile-arrows" aria-label="Slider controls">
        <button type="button" class="lumea-mobile-arrow lumea-mobile-arrow--prev" data-direction="prev" aria-label="Previous slide"></button>
        <button type="button" class="lumea-mobile-arrow lumea-mobile-arrow--next" data-direction="next" aria-label="Next slide"></button>
      </div>

      <div class="lumea-cursor-arrow" id="lumeaCursorArrow" aria-hidden="true"></div>
    </div>
  </section>

  <script>
    const slidesData = [
      {
        number: "01",
        text: "Botanical skincare rituals designed for luminous skin, soft texture, and everyday radiance.",
        image: "1.png"
      },
      {
        number: "02",
        text: "Clean formulas, soft botanicals, and refined essentials for a calm beauty routine.",
        image: "2.png"
      },
      {
        number: "03",
        text: "A curated edit of everyday glow products made for modern skincare rituals.",
        image: "hero.png"
      },
      {
        number: "04",
        text: "Soft hydration, botanical balance, and skin-first essentials for natural radiance.",
        image: "4.png"
      },
      {
        number: "05",
        text: "A fresh beauty wardrobe made for skin that feels balanced, bright, and alive.",
        image: "he.png"
      },
      {
        number: "06",
        text: "Glow-focused skincare where timeless botanicals meet a modern beauty edge.",
        image: "6.png"
      }
    ];

    const slider = document.getElementById("lumeaSlider");
    const slidesRoot = document.getElementById("lumeaSlides");
    const card = document.getElementById("lumeaCard");
    const numberEl = document.getElementById("lumeaNumber");
    const textEl = document.getElementById("lumeaText");
    const cursorArrow = document.getElementById("lumeaCursorArrow");

    let activeIndex = 0;
    let isAnimating = false;
    let cursorSide = "right";

    let cursorX = 0;
    let cursorY = 0;
    let renderedCursorX = 0;
    let renderedCursorY = 0;

    let activeAnimations = [];

    function createSlides() {
      slidesData.forEach((slide, index) => {
        const slideEl = document.createElement("div");
        slideEl.className = "lumea-slide";
        slideEl.dataset.index = index;

        slideEl.innerHTML = `
          <div class="lumea-slide-inner">
            <img src="${slide.image}" alt="Luméa slide ${index + 1}" draggable="false">
          </div>
        `;

        slidesRoot.appendChild(slideEl);
      });
    }

    function preloadImages() {
      return Promise.all(
        slidesData.map((slide) => {
          return new Promise((resolve) => {
            const image = new Image();
            image.onload = resolve;
            image.onerror = resolve;
            image.src = slide.image;
          });
        })
      );
    }

    function getWrappedIndex(index) {
      const total = slidesData.length;
      return ((index % total) + total) % total;
    }

    function getShortestDelta(index, active) {
      const total = slidesData.length;
      let delta = index - active;

      if (delta > total / 2) {
        delta -= total;
      }

      if (delta < -total / 2) {
        delta += total;
      }

      return delta;
    }

    function updateSlides() {
      const slides = document.querySelectorAll(".lumea-slide");

      slides.forEach((slide) => {
        const index = Number(slide.dataset.index);
        const delta = getShortestDelta(index, activeIndex);

        slide.classList.remove(
          "is-active",
          "is-prev",
          "is-next",
          "is-hidden-left",
          "is-hidden-right"
        );

        if (delta === 0) {
          slide.classList.add("is-active");
        } else if (delta === -1) {
          slide.classList.add("is-prev");
        } else if (delta === 1) {
          slide.classList.add("is-next");
        } else if (delta < 0) {
          slide.classList.add("is-hidden-left");
        } else {
          slide.classList.add("is-hidden-right");
        }
      });
    }

    function updateCard() {
      const currentSlide = slidesData[activeIndex];

      card.classList.add("is-changing");

      window.setTimeout(() => {
        numberEl.textContent = currentSlide.number;
        textEl.textContent = currentSlide.text;

        requestAnimationFrame(() => {
          card.classList.remove("is-changing");
        });
      }, 250);
    }

    function clearZoomAnimations() {
      activeAnimations.forEach((animation) => {
        try {
          animation.cancel();
        } catch (error) {}
      });

      activeAnimations = [];
    }

    function animateSlideZoom(currentIndex) {
      clearZoomAnimations();

      const currentInner = document.querySelector(
        `.lumea-slide[data-index="${currentIndex}"] .lumea-slide-inner`
      );

      const timing = {
        duration: 1280,
        easing: "cubic-bezier(0.19, 1, 0.22, 1)",
        fill: "both"
      };

      if (currentInner) {
        const animation = currentInner.animate(
          [
            {
              transform: "translate3d(0, 0, 0) scale(1.16)"
            },
            {
              transform: "translate3d(0, 0, 0) scale(1)"
            }
          ],
          timing
        );

        activeAnimations.push(animation);
      }
    }

    function goToSlide(direction) {
      if (isAnimating) return;

      isAnimating = true;

      if (direction === "next") {
        activeIndex = getWrappedIndex(activeIndex + 1);
      } else {
        activeIndex = getWrappedIndex(activeIndex - 1);
      }

      updateSlides();

      requestAnimationFrame(() => {
        animateSlideZoom(activeIndex);
        updateCard();
      });

      window.setTimeout(() => {
        isAnimating = false;
      }, 1320);
    }

    function moveCursor(event) {
      const rect = slider.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const isLeft = x < rect.width / 2;

      cursorSide = isLeft ? "left" : "right";
      cursorX = event.clientX;
      cursorY = event.clientY;

      cursorArrow.classList.add("is-visible");
      cursorArrow.classList.toggle("is-left", isLeft);
      cursorArrow.classList.toggle("is-right", !isLeft);
    }

    function renderCursor() {
      renderedCursorX += (cursorX - renderedCursorX) * 0.22;
      renderedCursorY += (cursorY - renderedCursorY) * 0.22;

      cursorArrow.style.left = `${renderedCursorX}px`;
      cursorArrow.style.top = `${renderedCursorY}px`;

      requestAnimationFrame(renderCursor);
    }

    slider.addEventListener("mousemove", moveCursor);

    slider.addEventListener("mouseleave", () => {
      cursorArrow.classList.remove("is-visible", "is-left", "is-right");
    });

    slider.addEventListener("click", (event) => {
      const ignored = event.target.closest(".lumea-content-card, .lumea-mobile-arrows");

      if (ignored) return;

      goToSlide(cursorSide === "left" ? "prev" : "next");
    });

    document.querySelectorAll("[data-direction]").forEach((button) => {
      button.addEventListener("click", (event) => {
        event.stopPropagation();
        goToSlide(button.dataset.direction);
      });
    });

    createSlides();
    updateSlides();
    updateCard();
    renderCursor();

    preloadImages().then(() => {
      requestAnimationFrame(() => {
        slider.classList.remove("is-loading");
      });
    });
  </script>
</body>
</html>
