<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMÉA Letter by Letter SVG Draw</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #fffaf7;
    }

    .logo-wrap {
      width: min(76vw, 780px);
    }

    .lumea-logo {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .logo-letter {
      fill: transparent;
      stroke: #241816;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .is-filled .logo-letter {
      fill: #241816;
      stroke-width: 0;
      transition: fill 0.8s ease, stroke-width 0.8s ease;
    }
  </style>
</head>

<body>
  <div class="logo-wrap">
    <svg class="lumea-logo" width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="LUMÉA logo">
  <g id="lumea-logo-letters">
    <path id="letter-l" class="logo-letter" d="m 353.61621,175 h 67.89551 V 160.71777 H 369.87598 V 65.869141 h -16.25977 z" />
    <path id="letter-u" class="logo-letter" d="m 479.26172,176.75781 c 26.2207,0 43.35937,-16.33301 43.35937,-39.11133 V 65.869141 h -16.18652 v 70.458979 c 0,14.94141 -10.32715,25.70801 -27.17285,25.70801 -16.77246,0 -27.09961,-10.7666 -27.09961,-25.70801 V 65.869141 h -16.18652 v 71.777339 c 0,22.77832 17.06543,39.11133 43.28613,39.11133 z" />
    <path id="letter-m" class="logo-letter" d="M 543.53027,175 h 16.04004 v -59.47266 c 0,-7.39746 -0.29297,-17.797848 -0.51269,-27.685543 3.95508,11.279297 7.61718,21.679683 9.88769,27.685543 L 592.16309,175 h 13.33007 l 22.99805,-59.47266 c 2.34375,-6.22558 6.0791,-17.358395 10.10742,-29.223629 -0.21972,10.327148 -0.51269,21.459959 -0.51269,29.223629 V 175 h 15.96679 V 65.869141 h -22.99804 l -24.09668,63.940429 c -1.9043,5.56641 -5.49317,15.89355 -7.9834,23.4375 -2.49024,-7.54395 -6.0791,-17.87109 -8.05664,-23.4375 L 566.45508,65.869141 h -22.92481 z" />
    <path id="letter-e" class="logo-letter" d="m 675.47461,175 h 73.38867 v -14.28223 h -57.12891 v -34.27734 h 52.88086 V 112.30469 H 691.73437 V 80.151367 h 57.12891 V 65.869141 H 675.47461 Z M 705.57715,56.054687 h 12.01172 L 733.18945,33.862305 H 716.63672 Z" />
    <path id="letter-a" class="logo-letter" d="M 756.51562,175 h 17.28516 l 9.96094,-28.34473 h 44.01855 L 837.44824,175 h 17.65137 L 815.76855,65.869141 h -19.6289 z m 32.15333,-42.1875 6.81152,-19.33594 c 3.00293,-9.00879 6.15234,-18.603513 10.54687,-32.739255 4.32129,14.135742 7.39746,23.730465 10.40039,32.739255 l 6.5918,19.33594 z" />
  </g>
</svg>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <!-- Add your Club GSAP DrawSVGPlugin file here, example:
  <script src="./DrawSVGPlugin.min.js"></script>
  -->

  <script>
    const letters = gsap.utils.toArray(".logo-letter");

    if (window.DrawSVGPlugin) {
      gsap.registerPlugin(DrawSVGPlugin);

      gsap.set(letters, { drawSVG: "0%" });

      const tl = gsap.timeline({ delay: 0.25 });

      tl.to(letters, {
        drawSVG: "100%",
        duration: 0.85,
        ease: "power2.inOut",
        stagger: 0.22
      })
      .to("#lumea-logo-letters", {
        duration: 0.01,
        onComplete: () => document.querySelector(".lumea-logo").classList.add("is-filled")
      });
    } else {
      // Fallback animation if DrawSVGPlugin is not loaded.
      letters.forEach((letter) => {
        const length = letter.getTotalLength();
        letter.style.strokeDasharray = length;
        letter.style.strokeDashoffset = length;
      });

      const tl = gsap.timeline({ delay: 0.25 });

      tl.to(letters, {
        strokeDashoffset: 0,
        duration: 0.55,
        ease: "power2.inOut",
        stagger: 0.42
      })
      .to("#lumea-logo-letters", {
        duration: 0.01,
        onComplete: () => document.querySelector(".lumea-logo").classList.add("is-filled")
      });
    }
  </script>
</body>
</html>
